<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* 🔥 GOLDEN GLOW AVATAR */
.top-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;

  border: 3px solid #facc15;

  box-shadow:
    0 0 0 2px rgba(250,204,21,0.4),
    0 0 12px rgba(250,204,21,0.6),
    0 0 22px rgba(250,204,21,0.5);

  animation: glowPulse 2s infinite ease-in-out;
}

@keyframes glowPulse {
  0% {
    box-shadow:
      0 0 0 2px rgba(250,204,21,0.4),
      0 0 10px rgba(250,204,21,0.5);
  }
  50% {
    box-shadow:
      0 0 0 4px rgba(250,204,21,0.6),
      0 0 20px rgba(250,204,21,0.9);
  }
  100% {
    box-shadow:
      0 0 0 2px rgba(250,204,21,0.4),
      0 0 10px rgba(250,204,21,0.5);
  }
}

/* 👑 FIXED CROWN (ONLY CHANGE) */
.avatar-wrap {
  position: relative;
  display: inline-flex;
  justify-content: center;
  align-items: center;
}

.crown {
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);

  font-size: 16px;

  animation: crownBounce 1.2s ease infinite;
  filter: drop-shadow(0 0 6px gold);
}

@keyframes crownBounce {
  0% { transform: translate(-50%, 0); }
  30% { transform: translate(-50%, -4px); }
  50% { transform: translate(-50%, 0); }
  70% { transform: translate(-50%, -2px); }
  100% { transform: translate(-50%, 0); }
}

/* ===== FONT ===== */
@font-face {
  font-family: 'OceanTrace';
  src: url('OceanTrace.ttf');
}

/* ===== GLOBAL ===== */
:root {
  --page-padding: 16px;
  --section-gap: 12px;
  --row-gap: 8px;
}

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: var(--page-padding);
}

/* ===== HEADER ===== */
.title {
  font-family: 'OceanTrace';
  font-size: 40px;
  text-align: center;

  background: linear-gradient(90deg, #2563eb, #22c55e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  margin: 0;
  line-height: 1.05;
}

.subtitle {
  text-align: center;
  color: #6b7280;
  font-size: 20px;
  margin-top: 2px;
}

.badge {
  margin: 10px auto;
  display: inline-block;
  padding: 8px 25px;
  border-radius: 30px;
  background: linear-gradient(90deg, #2563eb, #22c55e);
  color: white;
  font-weight: 600;
}

/* ===== TOP SECTION ===== */
.top {
  display: flex;
  flex-wrap: wrap;          /* 🔥 allows multiple rows */
  justify-content: center;
  gap: 8px;
}

.top-card {
  flex: 1;
  background: #e6f7ec;
  border-radius: 16px;
  padding: 15px;
  text-align: center;
  border: 2px solid #86efac;
}

.top-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 3px solid #22c55e;
}

.top-name {
  font-size: 14px;
  font-weight: 600;
  margin-top: 4px;
}

.top-score {
  font-size: 25px;
  font-weight: bold;
  color: #16a34a;
}

/* ===== LIST ===== */
.list {
  display: flex;
  flex-direction: column;
  padding: 6px;
  gap: 4px;
}

.row {
  background: white;
  border-radius: 14px;
  padding: 8px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;

  /* ✨ ADD THIS */
  opacity: 0;
  transform: translateY(10px);
  animation: fadeIn 0.4s ease forwards;
}

.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.rank {
  font-size: 12px;
  color: #6b7280;
  width: 18px;
}

.avatar {
  width: 35px;
  height: 35px;
  border-radius: 50%;
}

/* ===== SCORE CIRCLE ===== */
.score {
  min-width: 30px;
  height: 30px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 50%;
  font-size: 18px;
  font-weight: 700;
  color: white;
}

/* COLOR VARIANTS */
.blue { background: #2563eb; }
.green { background: #22c55e; }
.light { background: #60a5fa; }
.soft { background: #4ade80; }

/* ===== FOOTER ===== */
.footer {
  text-align: center;
  margin-top: 16px;
  font-size: 14px;
}
.footer span {
  color: #22c55e;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* stagger delay (one by one effect) */
.row:nth-child(1) { animation-delay: 0.05s; }
.row:nth-child(2) { animation-delay: 0.1s; }
.row:nth-child(3) { animation-delay: 0.15s; }
.row:nth-child(4) { animation-delay: 0.2s; }
.row:nth-child(5) { animation-delay: 0.25s; }
.row:nth-child(6) { animation-delay: 0.3s; }
.row:nth-child(7) { animation-delay: 0.35s; }
.row:nth-child(8) { animation-delay: 0.4s; }
.row:nth-child(9) { animation-delay: 0.45s; }
.row:nth-child(10) { animation-delay: 0.5s; }
.row:nth-child(11) { animation-delay: 0.55s; }

.row {
  transition: transform 0.5s ease, background 0.3s;
}

</style>
</head>

<body>

<div class="container">

<div class="title">Maa ki khushi</div>
<div class="subtitle">Mother’s Day Special</div>

<div style="text-align:center">
  <div class="badge">LEADERBOARD</div>
</div>

<div class="top" id="top"></div>
<div class="list" id="list"></div>

<div class="footer">
  Keep booking. <span>Keep smiling.</span>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw5bdTrnLF5mtzqIpElHnd-wvQDf_Rc-if73UsDWLnNZYPqsU9I367uyKUhbejZ8Wd3aA/exec";

async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  data.sort((a,b)=>b.score-a.score);

  const topDiv = document.getElementById("top");
  const listDiv = document.getElementById("list");

  topDiv.innerHTML = "";
  listDiv.innerHTML = "";

  const topScore = data[0]?.score;
  const toppers = data.filter(p => p.score === topScore);

  toppers.forEach(p=>{
    const div = document.createElement("div");
    div.className = "top-card";

    div.innerHTML = `
      <div class="avatar-wrap">
        <div class="crown">👑</div>
        <img class="top-avatar" src="${p.photo}">
      </div>
      <div class="top-name">${p.name}</div>
      <div class="top-score">${p.score}</div>
    `;

    topDiv.appendChild(div);
  });

  const rest = data.filter(p => p.score !== topScore);

  let rank = toppers.length + 1;
  const colors = ["blue","green","light","soft"];

  rest.forEach((p, i)=>{
    if(i > 0 && p.score !== rest[i-1].score){
      rank = i + toppers.length + 1;
    }

    const row = document.createElement("div");
    row.className = "row";

    const color = colors[i % colors.length];

    row.innerHTML = `
      <div class="left">
        <div class="rank">${rank}</div>
        <img class="avatar" src="${p.photo}">
        <div>${p.name}</div>
      </div>
      <div class="score ${color}">${p.score}</div>
    `;

    listDiv.appendChild(row);
  });
}

setInterval(loadData, 4000);
loadData();
</script>

</body>
</html>
